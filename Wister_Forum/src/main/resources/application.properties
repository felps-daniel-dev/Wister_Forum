
# 3. Driver do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Configuraçőes do Hibernate/JPA
# 'update' faz o Hibernate criar/alterar as tabelas sozinho baseado nas suas classes @Entity
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL no console (ajuda muito a entender o que está acontecendo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialeto para o MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect